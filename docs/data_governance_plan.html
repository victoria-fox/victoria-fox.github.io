<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victoria Fox</title>
    <link rel="stylesheet" href="../css/style.css" />

    <style>
      body { background: var(--bg); }

      #pdf-container {
        max-width: 860px;
        margin: 0 auto;
        padding: var(--gap);
      }

      .pdf-controls {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid var(--rule);
        margin-bottom: 2rem;
      }

      .btn {
        font-family: var(--font-sans);
        font-size: 0.8rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: var(--radius);
        cursor: pointer;
        border: 1px solid var(--rule);
        background: var(--surface);
        color: var(--ink);
        transition: border-color 0.15s, background 0.15s;
      }

      .btn:hover { border-color: var(--ink); }
      .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
      .btn-primary:hover { background: #333; }
    </style>

  </head>
  
  <body>
    <nav>
      <div class="nav-inner">
        <a href="../index.html" class="nav-logo">
          <div class="nav-logo-mark"><span>VF</span></div>
          <span class="nav-name">Victoria Fox</span>
        </a>
        <ul class="nav-links">
          <li><a href="../index.html">About</a></li>
          <li><a href="resume.html" class="active">Resume</a></li>
          <li><a href="projects.html">Projects</a></li>
        </ul>
      </div>
    </nav>
    <main id="pdf-container">
      <div class="pdf-controls">
        <a class="btn btn-primary" href="data_governance_plan.pdf" download>Download PDF</a>
      </div>
      <iframe
        src="https://docs.google.com/viewer?url=https://victoria-fox.github.io/docs/data_governance_plan.pdf&embedded=true"
        width="100%"
        height="900px"
        style="border: none;"
        title="Resume">
        <p>Your browser doesn't support embedded PDFs. <a href="data_governance_plan.pdf" download>Download it here.</a></p>
      </iframe>
    </main>
    <footer>
      <div class="footer-inner">
        <span>© <span id="year"></span> Victoria Fox</span>
        <div class="footer-links">
          <a href="https://github.com/victoria-fox" target="_blank" rel="noopener">GitHub</a>
          <a href="https://linkedin.com/in/vfox" target="_blank" rel="noopener">LinkedIn</a>
          <a href="easter-egg.html" class="easter-egg-link" title="✦">✦</a>
        </div>
      </div>
    </footer>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
