<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victoria Fox</title>
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    body { background: var(--bg); }

    #resume-container {
      max-width: 860px;
      margin: 0 auto;
      padding: var(--gap);
    }

    .resume-controls {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 2rem;
    }

    .btn {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid var(--rule);
      background: var(--surface);
      color: var(--ink);
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: var(--ink); }
    .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .btn-primary:hover { background: #333; }

    #resume-output { font-size: 0.9rem; }

    .status-msg {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--ink-soft);
      padding: 3rem 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <div class="nav-logo-mark"><span>VF</span></div>
        <span class="nav-name">Victoria Fox</span>
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">About</a></li>
        <li><a href="resume.html" class="active">Resume</a></li>
        <li><a href="projects.html">Projects</a></li>
      </ul>
    </div>
  </nav>

  <main id="resume-container">
  <div class="resume-controls">
    <a class="btn btn-primary" href="../docs/resume.pdf" target="_blank" rel="noopener">View PDF</a>
    <a class="btn" href="../docs/resume.json" target="_blank" rel="noopener">View JSON</a>

  </div>
    <div id="resume-output">
      <p class="status-msg">Loading résumé…</p>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span>© <span id="year"></span> Victoria Fox</span>
      <div class="footer-links">
        <a href="https://github.com/victoria-fox" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/vfox" target="_blank" rel="noopener">LinkedIn</a>
        <a href="webrevival.html" class="easter-egg-link" title="✦">✦</a>
      </div>
    </div>
  </footer>

  <!-- Theme: https://www.npmjs.com/package/jsonresume-theme-even -->
  <script src="https://cdn.jsdelivr.net/npm/jsonresume-theme-even@0.14.0/dist/even.js"></script>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    fetch('../docs/resume.json')
      .then(r => {
        if (!r.ok) throw new Error('resume.json not found');
        return r.json();
      })
      .then(data => {
        if (typeof render === 'function') {
          document.getElementById('resume-output').innerHTML = render(data);
        } else {
          // Pretty-print raw JSON if theme doesn't load
          document.getElementById('resume-output').innerHTML =
            '<pre style="font-family:var(--font-mono);font-size:0.8rem;line-height:1.6;">' +
            JSON.stringify(data, null, 2) + '</pre>';
        }
      })
      .catch(() => {
        document.getElementById('resume-output').innerHTML = `
          <p class="status-msg">
            Couldn't load resume. 
            </a>
          </p>`;
      });
  </script>

</body>
</html>
