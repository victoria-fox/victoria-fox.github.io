<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>easter-egg</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: Georgia, serif;
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .tile {
      background: #000;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 860px;
      z-index: 1;
      padding: 0;
      gap: 1rem;
    }

    h1 { font-size: 1.5rem; font-weight: normal; color: #fff; margin: 0; }
    p { font-size: 1rem; line-height: 1.7; color: #fff; margin: 0; }
    a { font-size: 0.875rem; color: #fff; }

    .game-frame-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
    }

    .game-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .credit {
      font-size: 0.8125rem;
      color: #fff;
    }
    .credit a { color: #fff; }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="tile">
    <h1>You found the easter egg!</h1>
    <p>
      As a reward, please enjoy a few rounds of Space Cadet Pinball. It's a 90s classic. 
    </p>
    <a href="../index.html">← back to portfolio</a>
    <div class="game-frame-wrap">
      <iframe
        src="https://pinball.alula.me/"
        title="3D Pinball for Windows - Space Cadet"
        allow="autoplay"
        loading="lazy"
      ></iframe>
    </div>
    <p class="credit">
      Game by <a href="https://github.com/k4zmu2a/SpaceCadetPinball" target="_blank" rel="noopener">k4zmu2a</a>,
      WebAssembly port by <a href="https://github.com/alula/SpaceCadetPinball" target="_blank" rel="noopener">alula</a>,
      hosted at <a href="https://pinball.alula.me/" target="_blank" rel="noopener">pinball.alula.me</a>.
    </p>
  </div>

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); });

    function drawSparkle(x, y, size, opacity) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = '#fff';
      ctx.translate(x, y);

      const long = size;
      const short = size * 0.12;

      ctx.beginPath();

      ctx.moveTo(0, -long);
      ctx.lineTo(short, 0);
      ctx.lineTo(0, long);
      ctx.lineTo(-short, 0);
      ctx.closePath();

      ctx.moveTo(-long, 0);
      ctx.lineTo(0, short);
      ctx.lineTo(long, 0);
      ctx.lineTo(0, -short);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    const NUM_STARS = 1200;
    const stars = Array.from({ length: NUM_STARS }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 5 + 1.5,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.005 + 0.003,
      baseOpacity: Math.random() * 0.3 + 0.15,
    }));

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const opacity = s.baseOpacity + (1 - s.baseOpacity) * 0.5 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
        drawSparkle(s.x, s.y, s.size, opacity);
      }
      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>

</body>
</html>
